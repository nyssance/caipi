        }
        .search-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .search-input:focus { outline: none; border-color: #439c3a; }
        .nav {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);

            padding: 10px 20px;
            text-decoration: none;
            color: #122e38;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav a:hover, .nav a.active {
            background: #122e38;
            color: white;
        }
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        .method-index {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-height: 80vh;
            overflow-y: auto;
        }
        .index-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .index-item:hover { background: #f9f9f9; }
        .index-item.active { background: #e8f5ea; border-left: 3px solid #439c3a; }
        .index-name { font-weight: bold; color: #122e38; margin-bottom: 4px; }
        .index-type { font-size: 0.85em; color: #888; margin-bottom: 4px; }
        .index-location { font-size: 0.8em; color: #666; }
        .index-section { margin-bottom: 20px; }
        .section-title {
            font-weight: bold;
            color: #122e38;
            margin: 15px 0 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #439c3a;
        }
        .method-detail {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .detail-header {
            background: #122e38;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .detail-name { font-size: 1.3em; color: white; }
        .detail-signature {
            font-family: monospace;
            font-size: 0.9em;
            color: #e8f5ea;
            margin-top: 5px;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
        }
        .detail-desc { color: #fff; margin-bottom: 10px; }
        .call-chain {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .call-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
        }
        .call-number {
            background: #439c3a;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .call-content { flex: 1; }
        .call-arrow { color: #439c3a; font-size: 1.5em; }
        .call-name { font-weight: bold; color: #122e38; }
        .call-type { color: #666; font-size: 0.9em; }
        .call-params { color: #555; font-size: 0.85em; }
        .call-result { color: #439c3a; font-weight: bold; margin-top: 5px; }
        .no-detail {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.1em;

</head>

                desc: '内部：测试 Claude CLI 认证',
                params: [
                    { name: 'claude_path', type: 'string', desc: 'Claude CLI 路径' }
                ],
                result: 'bool（是否已认证）',
                calls: [
                    { from: '执行命令', to: '运行简单提示', desc: 'run_hidden_command(claude_path, ["-p", "hi", "--model", "haiku", "--print"])' },
                    { from: '检查响应', to: 'exit code and output', desc: '检查 exit_code.success() 和 !output.stdout.is_empty()' }
                ]
            },

            // Session File Operations
            {
                name: 'load_claude_session_index',
                type: 'Rust 内部',
                location: 'src-tauri/src/backends/claude/sessions.rs',
                signature: 'fn load_claude_session_index(project_dir, limit?) -> Vec<SessionInfo>',
                desc: '内部：扫描项目目录读取 Claude 会话索引',
                params: [
                    { name: 'project_dir', type: '&Path', desc: '项目目录' },
                    { name: 'limit', type: 'Option<usize>', desc: '数量限制' }
                ],
                result: 'Vec<SessionInfo> (会话摘要列表)',
                calls: [
                    { from: 'fs::read_dir', to: '扫描目录', desc: '遍历目录查找 .jsonl 文件' },
                    { from: '过滤文件', to: '.jsonl and UUID filename', desc: '过滤扩展名为 jsonl 的文件，文件名必须是 UUID 格式' },
                    { from: '按修改时间排序', to: 'mtime sort', desc: '按文件修改时间排序（最新的在前）' },
                    { from: 'parse_fast', to: '快速解析', desc: 'parse_claude_session_summary_fast 读取前 20 行' },
                    { from: '应用限制', to: 'limit 截断', desc: '如果设置了 limit 则截断结果' }
                ]
            },
            {
                name: 'parse_claude_session_summary_fast',
                type: 'Rust 内部',
                location: 'src-tauri/src/backends/claude/sessions.rs',
                signature: 'fn parse_claude_session_summary_fast(path, mtime) -> Option<SessionInfo>',
                desc: '内部：快速解析会话文件头部（只读前 20 行）',
                params: [
                    { name: 'path', type: '&Path', desc: '会话文件路径' },
                    { name: 'mtime', type: 'SystemTime', desc: '文件修改时间' }
                ],
                result: 'Option<SessionInfo> (会话元数据)',
                calls: [
                    { from: '打开文件', to: 'File::open', desc: '打开 .jsonl 文件' },
                    { from: '读取行', to: '前 20 行', desc: '逐行读取 JSON' },
                    { from: '解析 JSON', to: 'serde_json::from_str', desc: '解析每行 JSON' },
                    { from: '提取 cwd', to: '从 user/assistant 事件', desc: 'json.get("cwd").as_str()' },
                    { from: '提取时间戳', to: 'timestamp 字段', desc: 'json.get("timestamp").as_str()' },
                    { from: '提取首个提示', to: '第一个 user 事件', desc: '第一个 type="user" 事件的 message.content' },
                    { from: '检查真实消息', to: '非元消息', desc: '确保至少有一个 user 或 assistant 事件' }
                    { from: '提取文件夹名', to: 'from path', desc: 'get_folder_name(folder_path)' }
                    { from: '构建结果', to: 'SessionInfo', desc: '组装 SessionInfo 对象' }
                ]
            },
            {
                name: 'load_session_history_messages',
                type: 'Rust 内部',
                location: 'src-tauri/src/backends/claude/sessions.rs',
                signature: 'fn load_session_history_messages(folder_path, session_id) -> Result<Vec<HistoryMessage>>',
                desc: '内部：读取完整会话历史',
                params: [
                    { name: 'folder_path', type: 'string', desc: '项目文件夹路径' },
                    { name: 'session_id', type: 'string', desc: '会话 ID' }
                ],
                result: 'Vec<HistoryMessage> (所有消息）',
                calls: [
                    { from: 'resolve_session_file', to: '解析路径', desc: 'resolve_session_file(folder_path, session_id)' },
                    { from: '读取文件', to: 'fs::read_to_string', desc: '读取完整 .jsonl 文件' },
                    { from: '解析 JSON', to: '每行解析', desc: '逐行解析 JSON' },
                    { from: '提取消息', to: '转换为 HistoryMessage', desc: '转换为前端使用的消息格式' }
                ]
            },
            {
                name: 'resolve_session_file',
                type: 'Rust 内部',
                location: 'src-tauri/src/backends/claude/sessions.rs',
                signature: 'fn resolve_session_file(folder_path, session_id) -> Result<Option<PathBuf>>',
                desc: '内部：解析会话文件完整路径',
                params: [
                    { name: 'folder_path', type: 'string', desc: '项目文件夹路径' },
                    { name: 'session_id', type: 'string', desc: '会话 ID' }
                ],
                result: 'Result<Option<PathBuf>> (会话文件路径)',
                calls: [
                    { from: '获取主目录', to: 'dirs::home_dir', desc: '获取用户主目录' },
                    { from: '构建路径', to: '~/.claude/projects/[encoded_path]', desc: '构建 Claude 项目目录' },
                    { from: '编码路径', to: 'encode_folder_path(folder_path)', desc: '将文件夹路径编码为 Claude 格式' },
                    { from: '构造文件名', to: 'format!("{}.jsonl", session_id)', desc: '构造 .jsonl 文件名' },
                    { from: '检查文件', to: 'PathBuf::exists', desc: '检查文件是否存在' }
                ]
            },
            {
                name: 'encode_folder_path',
                type: 'Rust 内部',
                location: 'src-tauri/src/commands/sessions.rs',
                signature: 'fn encode_folder_path(path) -> string',
                desc: '内部：将文件夹路径编码为 Claude 格式',
                params: [
                    { name: 'path', type: 'string', desc: '文件夹路径' }
                ],
                result: 'string (编码后的路径)',
                calls: [
                    { from: '规范化', to: '转斜杠', desc: 'path.replace('\\\\'', '/')' },
                    { from: '移除驱动器', to: 'Windows 特殊处理', desc: '移除 Windows 驱动器（C:）' },
                    { from: '替换斜杠', to: '使用连字符', desc: 'replace('/', "-")' }
                ]
            }
        ];

        // 渲染方法索引
        const methodIndex = document.getElementById('methodIndex');
        const methodDetail = document.getElementById('methodDetail');
        const searchInput = document.getElementById('searchInput');

        // 按类型分组
        const methodsByType = {};
        methods.forEach(method => {
            if (!methodsByType[method.type]) {
                methodsByType[method.type] = [];
            }
            methodsByType[method.type].push(method);
        });

        // 当前选中的方法
        let selectedMethod = null;

        function renderIndex(searchTerm = '') {
            const filteredMethods = methods.filter(method => {
                const searchTerm = searchTerm.toLowerCase();
                return (
                    method.name.toLowerCase().includes(searchTerm) ||
                    method.location.toLowerCase().includes(searchTerm) ||
                    method.signature.toLowerCase().includes(searchTerm) ||
                    method.desc.toLowerCase().includes(searchTerm) ||
                    method.params.some(p => p.name.toLowerCase().includes(searchTerm) || p.type.toLowerCase().includes(searchTerm) || p.desc.toLowerCase().includes(searchTerm)) ||
                    method.result.toLowerCase().includes(searchTerm)
                );
            });

            // 按类型分组显示
            methodIndex.innerHTML = '';

            const typeOrder = ['Tauri 命令', 'Rust 内部', '前端 Store', '前端组件'];

            typeOrder.forEach(type => {
                const typeMethods = filteredMethods.filter(m => m.type === type);
                if (typeMethods.length === 0) return;

                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'index-section';

                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.textContent = type;
                sectionDiv.appendChild(sectionTitle);

                typeMethods.forEach((method, index) => {
                    const item = document.createElement('div');
                    item.className = 'index-item';
                    item.innerHTML = `
                        <div class="index-name">${method.name}</div>
                        <div class="index-type">${method.type}</div>
                        <div class="index-location">${method.location}</div>
                    `;
                    item.onclick = () => showMethodDetail(method);
                    methodIndex.appendChild(item);
                });

                methodIndex.appendChild(sectionDiv);
            });

            if (filteredMethods.length === 0) {
                methodIndex.innerHTML = '<div class="no-detail">未找到匹配的方法</div>';
            }
        }

        function showMethodDetail(method) {
            selectedMethod = method;

            const detailHTML = `
                <div class="detail-header">
                    <div class="detail-name">${method.name}</div>
                    <div class="detail-signature">${method.signature}</div>
                    <div class="detail-desc">${method.desc}</div>
                </div>

                <div class="call-chain">
            `;

            method.calls.forEach((call, index) => {
                const arrow = index < method.calls.length - 1 ? '↓' : '→';
                detailHTML += `
                    <div class="call-step">
                        <div class="call-number">${index + 1}</div>
                        <div class="call-content">
                            <div class="call-arrow">${arrow}</div>
                            <div>
                                <div class="call-name">${call.from}</div>
                                <div class="call-type">→</div>
                                <div class="call-params">${call.desc}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // 添加结果
            detailHTML += `
                    <div class="call-step">
                        <div class="call-number">${method.calls.length + 1}</div>
                        <div class="call-content">
                            <div class="call-result">${method.result}</div>
                        </div>
                    </div>
                </div>
            </div>
            `;

            methodDetail.innerHTML = detailHTML;
        }

        // 搜索功能
        searchInput.addEventListener('input', (e) => {
            renderIndex(e.target.value);
        });

        // 初始渲染
        renderIndex('');
    </script>
</body>
</html>
